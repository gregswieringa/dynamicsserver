# Centralized logging: Loki stores/indexes logs shipped by every other
# container's `loki` logging driver (see docker-compose.staging.yml /
# .prod.yml / .jenkins.yml); Grafana is the query UI (LogQL) since Loki has
# no UI of its own. Standalone compose file, same convention as
# docker-compose.jenkins.yml -- run via
# `docker compose -f docker-compose.observability.yml up -d`.
#
# One-time host setup this assumes (see CLAUDE.md): the Docker Loki logging
# driver plugin installed on this VM's daemon
# (`docker plugin install grafana/loki-docker-driver:latest --alias loki
# --grant-all-permissions`), and deploy/observability.env populated (copy
# deploy/observability.env.example, fill in a real Grafana admin password).
#
# Loki and Prometheus are loopback-only (127.0.0.1) -- only this host's own
# containers/Grafana need them, no reason to expose either publicly.
# Grafana is the one meant to be browsed directly.
#
# Prometheus joins staging's and prod's own Compose networks (external
# references below) so it can scrape buyer-api's /metrics directly over
# their internal port 8000 -- see observability/prometheus.yml. This is why
# Prometheus needs no networking workaround the way Jenkins did: it's the
# one reaching *into* those networks as a normal client, not trying to see
# ports published on the host from a separate network namespace.
services:
  loki:
    image: grafana/loki:2.9.6
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - default
      - buyerapi-staging
      - buyerapi-prod
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/loki.yaml:ro
      - ./observability/grafana-datasources-prometheus.yaml:/etc/grafana/provisioning/datasources/prometheus.yaml:ro
      - ./observability/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./observability/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      # 8083, not Grafana's default 3000: some networks silently block
      # outbound to port 3000 (a common dev-server port), confirmed
      # directly when a user's home network timed out on 3000 but reached
      # it fine over cellular data. 8083 sits in the already-open range
      # (8080 Jenkins, 8081 staging, 8082 prod).
      - "8083:3000"
    depends_on:
      - loki
      - prometheus
    restart: unless-stopped

networks:
  buyerapi-staging:
    external: true
    name: buyerapi-staging_default
  buyerapi-prod:
    external: true
    name: buyerapi-prod_default

volumes:
  loki_data:
  grafana_data:
  prometheus_data:
