# Unlike docker-compose.staging.yml, this fronts buyer-api with Traefik and
# runs 4 replicas -- modeling the next layer of a real topology (a BFF
# routing through a single entry point to multiple API instances, not one
# instance directly). Staging deliberately stays single-instance; it's
# where a developer verifies their own work, not where this topology needs
# modeling. Still pull-only/deploy-only, still driven by deploy/prod.env,
# still promotes the exact tag staging ran -- see docker-compose.staging.yml's
# header for that rationale, which is otherwise unchanged.
services:
  postgres:
    image: ghcr.io/gregswieringa/buyer-api-postgres:${IMAGE_TAG}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"   # loopback only -- never expose the DB port publicly
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging:
      driver: loki
      options:
        loki-url: "http://127.0.0.1:3100/loki/api/v1/push"
        loki-retries: "3"
        loki-batch-size: "400"

  buyer-api:
    image: ghcr.io/gregswieringa/buyer-api:${IMAGE_TAG}
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    # No host port publish here on purpose -- 4 replicas can't all bind the
    # same host port. Traefik (below) is the only thing publishing a host
    # port now; it discovers and load-balances across however many
    # containers this service actually has.
    deploy:
      replicas: 4
    healthcheck:
      # No curl/wget in python:3.12-slim, so use the stdlib instead. Mainly
      # for accurate `docker compose ps` status and parity with postgres --
      # Traefik's own healthcheck (via labels below) is what actually keeps
      # it from routing to a not-yet-ready replica during a rollout.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
    labels:
      - "traefik.enable=true"
      # PathPrefix, not Host(): Postman/curl hit this VM by raw IP, not a
      # domain name, so a Host()-based rule would never match and every
      # request would 404 at Traefik before ever reaching buyer-api.
      - "traefik.http.routers.buyer-api.rule=PathPrefix(`/`)"
      - "traefik.http.services.buyer-api.loadbalancer.server.port=8000"
      - "traefik.http.services.buyer-api.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.buyer-api.loadbalancer.healthcheck.interval=10s"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: loki
      options:
        loki-url: "http://127.0.0.1:3100/loki/api/v1/push"
        loki-retries: "3"
        loki-batch-size: "400"

  traefik:
    # v3.6+ specifically, not just "latest v3": Docker 29 raised its daemon's
    # minimum supported API version to 1.44, and Traefik versions before
    # 3.6.1 hardcode an old client version (1.24) that the daemon now
    # rejects outright -- discovered directly (confirmed on both this VM
    # and this project's dev Codespace, so it's a real Docker-29-era
    # incompatibility, not an environment quirk), and it's silent: Traefik
    # logs a retrying error but otherwise looks like it started fine, while
    # actually discovering zero containers. Setting DOCKER_API_VERSION does
    # NOT work around it (verified) -- only the Traefik-side fix does.
    image: traefik:v3.6
    command:
      - "--providers.docker=true"
      # false on purpose: without this Traefik watches every container on
      # the host daemon (Jenkins, Grafana, Loki, staging's buyer-api), not
      # just this project's. Only buyer-api above opts in via its own
      # traefik.enable=true label.
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--accesslog=true"
    ports:
      - "${BUYER_API_PORT}:80"
    volumes:
      # Needed to watch containers/labels. `:ro` only blocks writes to the
      # socket file itself, not the Docker API surface reachable through it
      # -- accepted risk here, same class of tradeoff already made for
      # Jenkins' and Prometheus' own docker.sock access this project.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  pgdata:
