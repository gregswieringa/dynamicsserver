# Jenkins, meant to run on the same Oracle VM as staging/prod. See
# jenkins/Dockerfile's header for why it needs the host's docker.sock
# mounted in (Docker-outside-of-Docker) rather than running Docker nested.
#
# network_mode: host is required, not optional: Jenkinsfile stages curl
# `localhost:<port>` to health-check sibling containers (postgres/buyer-api)
# that the *host* Docker daemon started and published ports for. Without
# host networking, Jenkins has its own isolated network namespace -- its
# "localhost" is private to itself, so those curls silently hit nothing
# (confirmed directly: curl from the VM's own shell got a real response,
# the identical curl from inside the default-networked Jenkins container
# got connection failures) even though the containers were healthy the
# whole time. Host networking makes Jenkins share the VM's real network
# stack, the same as running these commands directly on the VM would.
#
# jenkins_home persists Jenkins' own state (jobs, plugins, credentials)
# across container recreation. deploy_env is a *separate* persistent volume
# holding deploy/staging.env and deploy/prod.env with real secrets --
# deliberately outside any git checkout, so it survives independently of
# Jenkins' per-job workspace churn (see CLAUDE.md's "CI/CD (Jenkins)"
# section for how those files get there the first time).
#
# Before building: run `getent group docker` on the VM and pass that GID:
#   DOCKER_GID=$(getent group docker | cut -d: -f3) docker compose -f docker-compose.jenkins.yml up -d --build
services:
  jenkins:
    build:
      context: ./jenkins
      args:
        DOCKER_GID: ${DOCKER_GID:-999}
    network_mode: host
    volumes:
      - jenkins_home:/var/jenkins_home
      - deploy_env:/var/jenkins_home/deploy-env
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    # Reaches the real VM host's loopback here (network_mode: host above),
    # not a private container namespace -- see docker-compose.observability.yml.
    logging:
      driver: loki
      options:
        loki-url: "http://127.0.0.1:3100/loki/api/v1/push"
        loki-retries: "3"
        loki-batch-size: "400"

volumes:
  jenkins_home:
  deploy_env:
